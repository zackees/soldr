name: Build macOS x64

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15-intel
      target: x86_64-apple-darwin
      binary_name: soldr
      source_ref: ${{ github.sha }}
