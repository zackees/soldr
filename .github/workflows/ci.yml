name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.ref_name == 'main'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: zackees/setup-soldr@1937c19529f3690df5553a36dd33f39ccb20b070 # v0.1.0 / v0
        with:
          # Formatting does not benefit from a restored target directory, but
          # clippy still uses soldr's compilation cache below.
          target-cache: false

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: soldr cargo clippy --workspace --all-targets --locked -- -D warnings

  build-linux-x64:
    name: Linux x64
    if: github.ref_name == 'main'
    runs-on: ubuntu-24.04
    needs: lint
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: zackees/setup-soldr@1937c19529f3690df5553a36dd33f39ccb20b070 # v0.1.0 / v0

      - name: Build workspace
        run: soldr cargo build --workspace --locked

      - name: Run library tests
        run: soldr cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: soldr cargo test -p soldr-cli --test cli --locked

      - name: Run fetch integration test
        run: soldr cargo test -p soldr-fetch --test fetch_crgx --locked

  build-macos-x64:
    name: macOS x64
    if: github.ref_name == 'main'
    runs-on: macos-15-intel
    needs: lint
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: zackees/setup-soldr@1937c19529f3690df5553a36dd33f39ccb20b070 # v0.1.0 / v0

      - name: Build workspace
        run: soldr cargo build --workspace --locked

      - name: Run library tests
        run: soldr cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: soldr cargo test -p soldr-cli --test cli --locked

      - name: Run fetch integration test
        run: soldr cargo test -p soldr-fetch --test fetch_crgx --locked

  build-windows-x64:
    name: Windows x64
    if: github.ref_name == 'main'
    runs-on: windows-2025
    needs: lint
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: zackees/setup-soldr@1937c19529f3690df5553a36dd33f39ccb20b070 # v0.1.0 / v0

      - name: Build workspace
        run: soldr cargo build --workspace --locked

      - name: Run library tests
        run: soldr cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: soldr cargo test -p soldr-cli --test cli --locked

      - name: Verify Windows defaults to MSVC under Git Bash
        if: runner.os == 'Windows'
        shell: bash
        run: bash .github/scripts/windows-msys-default-msvc.sh

      - name: Run fetch integration test
        run: soldr cargo test -p soldr-fetch --test fetch_crgx --locked

  e2e-linux-x64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-x64-musl:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-musl
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-arm64-musl:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-musl
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-macos-x64:
    name: build
    if: github.event_name != 'push' || github.ref_name == 'main' || github.ref_name == 'release'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15-intel
      target: x86_64-apple-darwin
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-macos-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-windows-x64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      binary_name: soldr.exe
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-windows-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-11-arm
      target: aarch64-pc-windows-msvc
      binary_name: soldr.exe
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}
