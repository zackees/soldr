name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          # GitHub caches are branch-scoped. This workflow runs on push only, so
          # each branch writes into its own scope. That lets main refresh the
          # canonical parent cache while feature branches can also save their own
          # preferred child cache without duplicating work in pull_request runs.
          shared-key: workspace
          save-if: ${{ github.event_name == 'push' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: lint
    if: matrix.runner != 'macos-15-intel' || github.event_name != 'push' || github.ref_name == 'main' || github.ref_name == 'release'
    env:
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: macOS x64
            runner: macos-15-intel
          - name: Windows x64
            runner: windows-2025

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          # Use the same stable key lineage as lint. Pushes save branch-local
          # caches, which GitHub restores before falling back to base/default
          # branch caches on later branch pushes and on PR checks attached to
          # the branch head.
          shared-key: workspace
          save-if: ${{ github.event_name == 'push' }}

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: cargo test -p soldr-cli --test cli --locked

      - name: Verify Windows defaults to MSVC under Git Bash
        if: runner.os == 'Windows'
        shell: bash
        run: bash .github/scripts/windows-msys-default-msvc.sh

      - name: Run fetch integration test
        run: cargo test -p soldr-fetch --test fetch_crgx --locked

  e2e-linux-x64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-x64-musl:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-musl
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-linux-arm64-musl:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-musl
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-macos-x64:
    name: build
    if: github.event_name != 'push' || github.ref_name == 'main' || github.ref_name == 'release'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15-intel
      target: x86_64-apple-darwin
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-macos-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      binary_name: soldr
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-windows-x64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      binary_name: soldr.exe
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}

  e2e-windows-arm64:
    name: build
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-11-arm
      target: aarch64-pc-windows-msvc
      binary_name: soldr.exe
      save_cache: ${{ github.event_name == 'push' }}
      source_ref: ${{ github.sha }}
