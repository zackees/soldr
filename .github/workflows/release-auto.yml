name: Autonomous Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
  workflow_dispatch:
    inputs:
      force_pypi_publish:
        description: Force the PyPI wheel build/publish path for the current Cargo version, even if PyPI already lists files for it.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-auto-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect release version bump
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.validate.outputs.should_release }}
      should_publish_github_release: ${{ steps.validate.outputs.should_publish_github_release }}
      should_publish_pypi: ${{ steps.validate.outputs.should_publish_pypi }}
      tag_exists: ${{ steps.validate.outputs.tag_exists }}
      pypi_has_version: ${{ steps.validate.outputs.pypi_has_version }}
      pypi_file_count: ${{ steps.validate.outputs.pypi_file_count }}
      version: ${{ steps.validate.outputs.version }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compare candidate version against PyPI
        id: validate
        env:
          FORCE_PYPI_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_pypi_publish || false }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          commit_sha='${{ github.sha }}'
          force_pypi_publish="${FORCE_PYPI_PUBLISH,,}"

          cargo_version="$(
            sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\([^"]*\)"/\1/p}' Cargo.toml | head -n1
          )"

          if [[ -z "$cargo_version" ]]; then
            echo "failed to derive workspace version from Cargo.toml" >&2
            exit 1
          fi

          version="v${cargo_version}"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "derived version must look like vX.Y.Z" >&2
            exit 1
          fi

          tag_exists=false
          if git ls-remote --exit-code --tags origin "$version" >/dev/null 2>&1; then
            tag_exists=true
          fi

          pypi_json="$(curl -fsSL https://pypi.org/pypi/soldr/json)"
          pypi_version="$(jq -r '.info.version // ""' <<< "$pypi_json")"

          if [[ -z "$pypi_version" || "$pypi_version" == "null" ]]; then
            echo "failed to fetch latest PyPI version for soldr" >&2
            exit 1
          fi

          pypi_file_count="$(
            jq --arg candidate "$cargo_version" -r '(.releases[$candidate] // []) | length' <<< "$pypi_json"
          )"
          pypi_has_version=false
          if (( pypi_file_count > 0 )); then
            pypi_has_version=true
          fi

          should_publish_github_release=false
          if [[ "$tag_exists" != "true" ]]; then
            should_publish_github_release=true
          fi

          should_publish_pypi=false
          if [[ "$pypi_has_version" != "true" || "$force_pypi_publish" == "true" ]]; then
            should_publish_pypi=true
          fi

          should_release=false
          if [[ "$should_publish_github_release" == "true" || "$should_publish_pypi" == "true" ]]; then
            should_release=true
          fi

          {
            echo "### Release detection"
            echo ""
            echo "- candidate version: \`$version\`"
            echo "- current PyPI latest: \`v${pypi_version}\`"
            echo "- PyPI files for candidate: \`$pypi_file_count\`"
            echo "- GitHub tag exists: \`$tag_exists\`"
            echo "- force PyPI publish: \`$force_pypi_publish\`"
            echo "- publish GitHub release assets: \`$should_publish_github_release\`"
            echo "- publish PyPI wheels: \`$should_publish_pypi\`"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "should_release=$should_release"
            echo "should_publish_github_release=$should_publish_github_release"
            echo "should_publish_pypi=$should_publish_pypi"
            echo "tag_exists=$tag_exists"
            echo "pypi_has_version=$pypi_has_version"
            echo "pypi_file_count=$pypi_file_count"
            echo "version=$version"
            echo "commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_publish_github_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: soldr.exe
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            binary: soldr.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --package soldr-cli --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          name="soldr-${version}-${{ matrix.target }}"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          tar -C dist/package -czf "dist/${name}.tar.gz" "${{ matrix.binary }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $name = "soldr-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "dist\package\${{ matrix.binary }}"
          Compress-Archive -Path "dist\package\${{ matrix.binary }}" -DestinationPath "dist\$name.zip" -Force

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-soldr-${{ matrix.target }}
          path: dist/soldr-*

  build-pypi:
    name: PyPI ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_publish_pypi == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Build hardened wheel
        shell: bash
        run: |
          uv tool install "maturin>=1.7,<2"
          maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --target "${{ matrix.target }}" \
            --out dist

      - name: Smoke test wheel
        shell: bash
        run: |
          uv venv .venv
          uv pip install --python .venv dist/*.whl
          .venv/bin/soldr --version || .venv/Scripts/soldr.exe --version

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-soldr-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Attest and publish release assets
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_publish_github_release == 'true' && needs.prepare.outputs.tag_exists == 'false'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-soldr-*
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum soldr-* > "soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt"

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: dist/soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.version }}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --generate-notes \
            --target "${{ needs.prepare.outputs.commit_sha }}" \
            --title "${{ needs.prepare.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "${{ needs.prepare.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false

  publish-pypi:
    name: Publish hardened PyPI wheels
    needs:
      - prepare
      - build-pypi
    if: needs.prepare.outputs.should_publish_pypi == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: pypi-soldr-*
          merge-multiple: true

      - name: Show Python distributions
        shell: bash
        run: |
          set -euo pipefail
          ls -1 dist

      - name: Publish wheel set to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
