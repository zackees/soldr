name: Autonomous Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-auto-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect release version bump
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.validate.outputs.should_release }}
      version: ${{ steps.validate.outputs.version }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Derive release version and commit
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          before_sha='${{ github.event.before }}'
          commit_sha='${{ github.sha }}'

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "autonomous releases must run from main" >&2
            exit 1
          fi

          git fetch origin main --depth=1
          git merge-base --is-ancestor "$commit_sha" origin/main

          cargo_version="$(
            sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\([^"]*\)"/\1/p}' Cargo.toml | head -n1
          )"

          if [[ -z "$cargo_version" ]]; then
            echo "failed to derive workspace version from Cargo.toml" >&2
            exit 1
          fi

          previous_version=""
          if [[ "$before_sha" =~ ^0+$ ]]; then
            previous_version=""
          elif git rev-parse --verify "${before_sha}^{commit}" >/dev/null 2>&1; then
            previous_version="$(
              git show "${before_sha}:Cargo.toml" |
                sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\([^"]*\)"/\1/p}' |
                head -n1
            )"
          fi

          if [[ "$cargo_version" == "$previous_version" ]]; then
            {
              echo "should_release=false"
              echo "version=v${cargo_version}"
              echo "commit_sha=$commit_sha"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="v${cargo_version}"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "derived version must look like vX.Y.Z" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "$version" >/dev/null 2>&1; then
            echo "tag $version already exists" >&2
            exit 1
          fi

          if gh release view "$version" >/dev/null 2>&1; then
            echo "release $version already exists" >&2
            exit 1
          fi

          {
            echo "should_release=true"
            echo "version=$version"
            echo "commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: macOS x64
            runner: macos-15-intel
          - name: Windows x64
            runner: windows-2025

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: cargo test -p soldr-cli --test cli --locked

      - name: Verify Windows defaults to MSVC under Git Bash
        if: runner.os == 'Windows'
        shell: bash
        run: bash .github/scripts/windows-msys-default-msvc.sh

      - name: Run fetch integration test
        run: cargo test -p soldr-fetch --test fetch_crgx --locked

  e2e-linux-x64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-arm64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-x64-musl:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-musl
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-arm64-musl:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-musl
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-macos-x64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15-intel
      target: x86_64-apple-darwin
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-macos-arm64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-windows-x64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      binary_name: soldr.exe
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-windows-arm64:
    name: build
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-11-arm
      target: aarch64-pc-windows-msvc
      binary_name: soldr.exe
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  build:
    name: ${{ matrix.name }}
    needs:
      - prepare
      - lint
      - test
      - e2e-linux-x64
      - e2e-linux-arm64
      - e2e-linux-x64-musl
      - e2e-linux-arm64-musl
      - e2e-macos-x64
      - e2e-macos-arm64
      - e2e-windows-x64
      - e2e-windows-arm64
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: soldr.exe
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            binary: soldr.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --package soldr-cli --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          name="soldr-${version}-${{ matrix.target }}"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          tar -C dist/package -czf "dist/${name}.tar.gz" "${{ matrix.binary }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $name = "soldr-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "dist\package\${{ matrix.binary }}"
          Compress-Archive -Path "dist\package\${{ matrix.binary }}" -DestinationPath "dist\$name.zip" -Force

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-soldr-${{ matrix.target }}
          path: dist/soldr-*

  build-pypi:
    name: PyPI ${{ matrix.name }}
    needs:
      - prepare
      - lint
      - test
      - e2e-linux-x64
      - e2e-linux-arm64
      - e2e-linux-x64-musl
      - e2e-linux-arm64-musl
      - e2e-macos-x64
      - e2e-macos-arm64
      - e2e-windows-x64
      - e2e-windows-arm64
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Build hardened wheel
        shell: bash
        run: |
          uv tool install "maturin>=1.7,<2"
          maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --target "${{ matrix.target }}" \
            --out dist

      - name: Smoke test wheel
        shell: bash
        run: |
          uv venv .venv
          uv pip install --python .venv dist/*.whl
          .venv/bin/soldr --version || .venv/Scripts/soldr.exe --version

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-soldr-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Attest and publish release assets
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.result == 'success' &&
        needs.build.result == 'success' &&
        needs.build-pypi.result == 'success'
      }}
    needs:
      - prepare
      - build
      - build-pypi
    runs-on: ubuntu-24.04
    environment: release

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-soldr-*
          merge-multiple: true

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: soldr

      - name: Verify GitHub App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}" --jq '.full_name'

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum soldr-* > "soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt"

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: dist/soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.version }}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --generate-notes \
            --target "${{ needs.prepare.outputs.commit_sha }}" \
            --title "${{ needs.prepare.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "${{ needs.prepare.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false

  publish-pypi:
    name: Publish hardened PyPI wheels
    if: needs.prepare.outputs.should_release == 'true'
    needs:
      - prepare
      - build-pypi
      - publish
    runs-on: ubuntu-24.04
    environment: release

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: pypi-soldr-*
          merge-multiple: true

      - name: Show Python distributions
        shell: bash
        run: |
          set -euo pipefail
          ls -1 dist

      - name: Publish wheel set to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
