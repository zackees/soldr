name: Parent Child Zccache Probe

on:
  push:
    branches:
      - "cache-probe/**"
  pull_request:
    paths:
      - ".github/workflows/parent-child-zccache-probe.yml"
      - "action.yml"
      - ".github/actions/setup-soldr/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cold-control:
    name: Cold cargo control
    runs-on: ubuntu-24.04
    outputs:
      seconds: ${{ steps.measure.outputs.seconds }}
      result: ${{ steps.measure.outputs.result }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - name: Time cold cargo build
        id: measure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p probe-results
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import time

          command = [
              "cargo",
              "build",
              "--package",
              "soldr-cli",
              "--locked",
              "--timings",
          ]
          start = time.perf_counter()
          proc = subprocess.run(
              command,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              check=False,
          )
          elapsed = time.perf_counter() - start
          print(proc.stdout, end="")

          result = "success" if proc.returncode == 0 else "failure"
          pathlib.Path("probe-results/cold-build.log").write_text(
              proc.stdout,
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"seconds={elapsed:.2f}\n")
              fh.write(f"result={result}\n")

          if proc.returncode != 0:
              sys.exit(proc.returncode)
          PY

      - name: Upload cold timing artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: parent-child-zccache-probe-cold
          path: |
            target/cargo-timings
            probe-results/cold-build.log
          if-no-files-found: warn

  warm-soldr:
    name: Warm setup-soldr build
    runs-on: ubuntu-24.04
    outputs:
      seconds: ${{ steps.measure.outputs.seconds }}
      result: ${{ steps.measure.outputs.result }}
      cache_hit: ${{ steps.setup.outputs.cache-hit }}
      build_cache_hit: ${{ steps.setup.outputs.build-cache-hit }}
      toolchain: ${{ steps.setup.outputs.toolchain }}
      soldr_version: ${{ steps.setup.outputs.soldr-version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: setup
        uses: ./
        with:
          cache: true
          build-cache: true

      - name: Show setup-soldr cache outputs
        shell: bash
        run: |
          {
            echo "cache-hit=${{ steps.setup.outputs.cache-hit }}"
            echo "build-cache-hit=${{ steps.setup.outputs.build-cache-hit }}"
            echo "toolchain=${{ steps.setup.outputs.toolchain }}"
            echo "soldr-version=${{ steps.setup.outputs.soldr-version }}"
          } | tee probe-setup-outputs.txt

      - name: Time soldr cargo build
        id: measure
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p probe-results
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import time

          command = [
              "soldr",
              "cargo",
              "build",
              "--package",
              "soldr-cli",
              "--locked",
              "--timings",
          ]
          start = time.perf_counter()
          proc = subprocess.run(
              command,
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              check=False,
          )
          elapsed = time.perf_counter() - start
          print(proc.stdout, end="")

          result = "success" if proc.returncode == 0 else "failure"
          pathlib.Path("probe-results/warm-build.log").write_text(
              proc.stdout,
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"seconds={elapsed:.2f}\n")
              fh.write(f"result={result}\n")

          if proc.returncode != 0:
              sys.exit(proc.returncode)
          PY

      - name: Capture soldr cache status
        if: always()
        shell: bash
        run: |
          soldr cache --json > probe-results/soldr-cache.json 2>&1 || true
          soldr cache > probe-results/soldr-cache.txt 2>&1 || true

      - name: Upload warm timing artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: parent-child-zccache-probe-warm
          path: |
            target/cargo-timings
            probe-results
            probe-setup-outputs.txt
          if-no-files-found: warn

  report:
    name: Report parent-child speedup
    if: always()
    needs:
      - cold-control
      - warm-soldr
    runs-on: ubuntu-24.04

    steps:
      - name: Build report
        id: report
        shell: bash
        env:
          ISSUE_NUMBER: "168"
          COLD_RESULT: ${{ needs.cold-control.outputs.result }}
          COLD_SECONDS: ${{ needs.cold-control.outputs.seconds }}
          WARM_RESULT: ${{ needs.warm-soldr.outputs.result }}
          WARM_SECONDS: ${{ needs.warm-soldr.outputs.seconds }}
          CACHE_HIT: ${{ needs.warm-soldr.outputs.cache_hit }}
          BUILD_CACHE_HIT: ${{ needs.warm-soldr.outputs.build_cache_hit }}
          SOLDR_VERSION: ${{ needs.warm-soldr.outputs.soldr_version }}
          TOOLCHAIN: ${{ needs.warm-soldr.outputs.toolchain }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib

          cold_raw = os.environ.get("COLD_SECONDS", "")
          warm_raw = os.environ.get("WARM_SECONDS", "")
          cold = float(cold_raw) if cold_raw else None
          warm = float(warm_raw) if warm_raw else None
          ratio = cold / warm if cold and warm else None
          saved = cold - warm if cold and warm else None
          subsecond = "yes" if warm is not None and warm < 1.0 else "no"

          def metric(value: float | None, suffix: str = "") -> str:
              return "n/a" if value is None else f"{value:.2f}{suffix}"

          body = f"""### Parent-to-child zccache cache report

          - workflow run: {os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}
          - branch/ref: `{os.environ["GITHUB_REF_NAME"]}`
          - commit: `{os.environ["GITHUB_SHA"]}`
          - cold control result: `{os.environ.get("COLD_RESULT") or "n/a"}`
          - warm setup-soldr result: `{os.environ.get("WARM_RESULT") or "n/a"}`
          - cold build seconds: `{metric(cold)}`
          - warm soldr build seconds: `{metric(warm)}`
          - seconds saved: `{metric(saved)}`
          - speedup vs cold control: `{metric(ratio, "x")}`
          - setup cache hit: `{os.environ.get("CACHE_HIT") or "n/a"}`
          - zccache build-cache hit: `{os.environ.get("BUILD_CACHE_HIT") or "n/a"}`
          - soldr version: `{os.environ.get("SOLDR_VERSION") or "n/a"}`
          - toolchain: `{os.environ.get("TOOLCHAIN") or "n/a"}`
          - sub-second target met: `{subsecond}`

          Note: `build-cache-hit=false` means either no cache was restored or the restore used a fallback key. Inspect the `build-cache-restore` logs in the workflow run to distinguish first child-branch fallback from a cold miss.
          """
          body = "\n".join(line.strip() for line in body.splitlines()) + "\n"

          path = pathlib.Path("parent-child-zccache-report.md")
          path.write_text(body, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"body_path={path}\n")
          print(body)
          PY

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: parent-child-zccache-probe-report
          path: parent-child-zccache-report.md
          if-no-files-found: error

      - name: Comment on tracking issue
        if: always() && github.repository == 'zackees/soldr'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: "168"
        run: gh issue comment "$ISSUE_NUMBER" --repo zackees/soldr --body-file parent-child-zccache-report.md
