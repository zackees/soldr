name: Build Linux x64 musl

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-musl
      binary_name: soldr
      source_ref: ${{ github.sha }}
