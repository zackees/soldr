name: _Bootstrap E2E

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      target:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      save_cache:
        required: false
        type: boolean
        default: false
      source_ref:
        required: true
        type: string
      third_party_repo:
        required: false
        type: string
        default: "zackees/soldr"
      third_party_ref:
        required: false
        type: string
        default: "0c8daefe4a4ac526b491fade590b32636340dce1"
      third_party_path:
        required: false
        type: string
        default: "third_party/bootstrap-fixture"
      third_party_build_dir:
        required: false
        type: string
        default: "crates/soldr-cli/tests/fixtures/windows-msvc-default"

permissions:
  contents: read

jobs:
  bootstrap-e2e:
    name: Build soldr and bootstrap third-party app (${{ inputs.target }})
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.source_ref }}
          path: soldr

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.third_party_repo }}
          ref: ${{ inputs.third_party_ref }}
          path: ${{ inputs.third_party_path }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        if: ${{ inputs.runner != 'windows-11-arm' }}
        with:
          targets: ${{ inputs.target }}

      - name: Install Rust toolchain on Windows ARM
        if: ${{ inputs.runner == 'windows-11-arm' }}
        shell: pwsh
        run: |
          rustup toolchain install 1.94.1 --profile minimal --component rustfmt --component clippy --target "${{ inputs.target }}"
          rustup default 1.94.1

      - name: Share bootstrap zccache with soldr
        shell: pwsh
        run: |
          $cacheRoot = Join-Path $env:RUNNER_TEMP "soldr-bootstrap"
          $soldrRoot = Join-Path $cacheRoot "soldr"
          $zccacheDir = Join-Path (Join-Path $soldrRoot "cache") "zccache"
          New-Item -ItemType Directory -Force -Path $zccacheDir | Out-Null

          "SOLDR_CACHE_DIR=$soldrRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZCCACHE_CACHE_DIR=$zccacheDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Sharing bootstrap zccache cache dir: $zccacheDir"

      - name: Install musl tools
        if: contains(inputs.target, 'musl')
        shell: bash
        run: |
          set -euo pipefail
          # Narrower input surface per #41:
          # - --no-install-recommends prevents apt from pulling in optional deps,
          #   so the exact package set is what the release path declares.
          # - a small retry loop makes transient apt/mirror errors recoverable
          #   without weakening the installed set.
          # - the resolved package version is logged so it is auditable from
          #   the workflow run.
          attempts=0
          max_attempts=3
          until sudo apt-get update; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "apt-get update failed after $max_attempts attempts" >&2
              exit 1
            fi
            sleep $((attempts * 3))
          done
          attempts=0
          until sudo apt-get install -y --no-install-recommends musl-tools; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "apt-get install musl-tools failed after $max_attempts attempts" >&2
              exit 1
            fi
            sleep $((attempts * 3))
          done
          dpkg-query -W -f='musl-tools installed version: ${Version}\n' musl-tools

      - uses: ./soldr/.github/actions/cache-benchmark-zccache
        with:
          # Keep branch-agnostic restore keys so feature branches can warm from
          # canonical main caches, while push builds on feature branches can
          # also save their own preferred branch-local cache entries.
          shared-key: ${{ inputs.target }}
          save-cache: ${{ inputs.save_cache }}
          target-dir: soldr/target
          zccache-version: "1.3.4"

      - name: Share bootstrap zccache binary with soldr
        shell: pwsh
        run: |
          $zccache = Get-Command zccache -ErrorAction Stop
          "SOLDR_ZCCACHE_BIN=$($zccache.Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Sharing bootstrap zccache binary: $($zccache.Source)"

      - name: Build soldr-cli
        shell: pwsh
        working-directory: soldr
        run: |
          cargo build --package soldr-cli --locked --target "${{ inputs.target }}"

      - name: Resolve third-party toolchain
        id: third_party_toolchain
        shell: pwsh
        run: |
          $checkoutRoot = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.third_party_path }}"
          $candidateFiles = @(
            (Join-Path $checkoutRoot "${{ inputs.third_party_build_dir }}/rust-toolchain.toml"),
            (Join-Path $checkoutRoot "rust-toolchain.toml")
          )

          $toolchainFile = $candidateFiles | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $toolchainFile) {
            "channel=repo-default" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $channelLine = Select-String -Path $toolchainFile -Pattern '^channel = "(.*)"$' | Select-Object -First 1
          if (-not $channelLine) {
            throw "failed to resolve third-party Rust toolchain from $toolchainFile"
          }

          $channel = $channelLine.Matches[0].Groups[1].Value
          rustup toolchain install $channel --profile minimal
          rustup target add --toolchain $channel "${{ inputs.target }}"
          "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve soldr binary path
        id: soldr_binary
        shell: pwsh
        run: |
          $soldrPath = Join-Path $env:GITHUB_WORKSPACE "soldr/target/${{ inputs.target }}/debug/${{ inputs.binary_name }}"
          "path=$soldrPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Show soldr version
        shell: pwsh
        run: |
          & "${{ steps.soldr_binary.outputs.path }}" --version

      - name: Build third-party app through soldr
        shell: pwsh
        working-directory: ${{ inputs.third_party_path }}/${{ inputs.third_party_build_dir }}
        run: |
          & "${{ steps.soldr_binary.outputs.path }}" cargo build --locked --target "${{ inputs.target }}"

      - name: Show shared soldr cache status
        if: ${{ always() }}
        continue-on-error: true
        shell: pwsh
        working-directory: ${{ inputs.third_party_path }}/${{ inputs.third_party_build_dir }}
        run: |
          $soldrPath = "${{ steps.soldr_binary.outputs.path }}"
          if ([string]::IsNullOrWhiteSpace($soldrPath) -or -not (Test-Path -LiteralPath $soldrPath)) {
            Write-Host "Soldr binary is unavailable; skipping shared cache status."
            exit 0
          }
          & $soldrPath cache

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: soldr-${{ inputs.target }}
          path: ${{ steps.soldr_binary.outputs.path }}

      - if: ${{ always() }}
        uses: ./soldr/.github/actions/cache-benchmark-zccache-cleanup
