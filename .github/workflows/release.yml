name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.1.0
        required: true
        type: string
      commit_sha:
        description: Exact commit SHA to validate and release
        required: true
        type: string
      dry_run:
        description: Validate the full release flow without creating a release tag or publishing assets
        required: false
        default: true
        type: boolean
      publish_pypi:
        description: Build hardened wheel artifacts and publish them to PyPI via Trusted Publishing
        required: false
        default: false
        type: boolean
      pypi_repository_url:
        description: Optional alternate upload endpoint such as https://test.pypi.org/legacy/
        required: false
        default: ""
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release inputs
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
      commit_sha: ${{ steps.validate.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_sha }}

      - name: Validate release version and commit
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version='${{ inputs.version }}'
          commit_sha='${{ inputs.commit_sha }}'
          publish_pypi='${{ inputs.publish_pypi }}'
          pypi_repository_url='${{ inputs.pypi_repository_url }}'

          if [[ "${GITHUB_REF_NAME}" != "release" ]]; then
            echo "validated releases must be dispatched from release" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like vX.Y.Z" >&2
            exit 1
          fi

          if [[ ! "$commit_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a full 40-character commit SHA" >&2
            exit 1
          fi

          if [[ "$publish_pypi" != "true" && -n "$pypi_repository_url" ]]; then
            echo "pypi_repository_url requires publish_pypi=true" >&2
            exit 1
          fi

          git fetch origin release --depth=1
          git rev-parse --verify "${commit_sha}^{commit}" >/dev/null
          git merge-base --is-ancestor "$commit_sha" origin/release

          if git ls-remote --exit-code --tags origin "$version" >/dev/null 2>&1; then
            echo "tag $version already exists" >&2
            exit 1
          fi

          if gh release view "$version" >/dev/null 2>&1; then
            echo "release $version already exists" >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: prepare
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: macOS x64
            runner: macos-15-intel
          - name: Windows x64
            runner: windows-2025

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run library tests
        run: cargo test --workspace --lib --locked

      - name: Run CLI smoke tests
        run: cargo test -p soldr-cli --test cli --locked

      - name: Run fetch integration test
        run: cargo test -p soldr-fetch --test fetch_crgx --locked

  e2e-linux-x64:
    name: E2E Linux x64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-arm64:
    name: E2E Linux ARM64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-x64-musl:
    name: E2E Linux x64 musl
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-musl
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-linux-arm64-musl:
    name: E2E Linux ARM64 musl
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-musl
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-macos-x64:
    name: E2E macOS x64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15-intel
      target: x86_64-apple-darwin
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-macos-arm64:
    name: E2E macOS ARM64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      binary_name: soldr
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-windows-x64:
    name: E2E Windows x64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      binary_name: soldr.exe
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  e2e-windows-arm64:
    name: E2E Windows ARM64
    needs: prepare
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-11-arm
      target: aarch64-pc-windows-msvc
      binary_name: soldr.exe
      source_ref: ${{ needs.prepare.outputs.commit_sha }}

  build:
    name: ${{ matrix.name }}
    needs:
      - prepare
      - lint
      - test
      - e2e-linux-x64
      - e2e-linux-arm64
      - e2e-linux-x64-musl
      - e2e-linux-arm64-musl
      - e2e-macos-x64
      - e2e-macos-arm64
      - e2e-windows-x64
      - e2e-windows-arm64
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: soldr
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: soldr
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: soldr.exe
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            binary: soldr.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --package soldr-cli --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          name="soldr-${version}-${{ matrix.target }}"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          tar -C dist/package -czf "dist/${name}.tar.gz" "${{ matrix.binary }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $name = "soldr-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "dist\package\${{ matrix.binary }}"
          Compress-Archive -Path "dist\package\${{ matrix.binary }}" -DestinationPath "dist\$name.zip" -Force

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-soldr-${{ matrix.target }}
          path: dist/soldr-*

  build-pypi:
    name: PyPI ${{ matrix.name }}
    if: ${{ inputs.publish_pypi }}
    needs:
      - prepare
      - lint
      - test
      - e2e-linux-x64
      - e2e-linux-arm64
      - e2e-linux-x64-musl
      - e2e-linux-arm64-musl
      - e2e-macos-x64
      - e2e-macos-arm64
      - e2e-windows-x64
      - e2e-windows-arm64
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - name: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
          - name: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install maturin
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .build-venv
          . .build-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.7,<2"

      - name: Install maturin
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          py -3 -m venv .build-venv
          .\.build-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.build-venv\Scripts\python.exe -m pip install "maturin>=1.7,<2"

      - name: Build hardened wheel
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          . .build-venv/bin/activate
          python -m maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --target "${{ matrix.target }}" \
            --out dist

      - name: Build hardened wheel
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\.build-venv\Scripts\python.exe -m maturin build `
            --release `
            --locked `
            --compatibility pypi `
            --target "${{ matrix.target }}" `
            --out dist

      - name: Smoke test wheel
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install dist/*.whl
          soldr --version

      - name: Smoke test wheel
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          py -3 -m venv .venv
          $wheel = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          if (-not $wheel) {
            throw "No wheel found in dist"
          }
          .\.venv\Scripts\python.exe -m pip install $wheel
          .\.venv\Scripts\soldr.exe --version

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pypi-soldr-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Attest and publish release assets
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.build.result == 'success' &&
        (needs.build-pypi.result == 'success' || needs.build-pypi.result == 'skipped')
      }}
    needs:
      - prepare
      - build
      - build-pypi
    runs-on: ubuntu-24.04
    environment: release

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-soldr-*
          merge-multiple: true

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: soldr

      - name: Verify GitHub App token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}" --jq '.full_name'

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum soldr-* > "soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt"

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: dist/soldr-${{ needs.prepare.outputs.version }}-SHA256SUMS.txt

      - name: Stop after dry run validation
        if: inputs.dry_run
        shell: bash
        run: |
          set -euo pipefail
          echo "dry run complete: release gating, artifact build, attestation, and GitHub App authentication all succeeded"

      - name: Create draft GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.version }}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --generate-notes \
            --target "${{ needs.prepare.outputs.commit_sha }}" \
            --title "${{ needs.prepare.outputs.version }}"

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "${{ needs.prepare.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false

  publish-pypi:
    name: Publish hardened PyPI wheels
    if: ${{ inputs.publish_pypi && !inputs.dry_run }}
    needs:
      - prepare
      - build-pypi
      - publish
    runs-on: ubuntu-24.04
    environment:
      name: release
      url: https://pypi.org/project/soldr/
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: pypi-soldr-*
          merge-multiple: true

      - name: Show Python distributions
        shell: bash
        run: |
          set -euo pipefail
          ls -1 dist

      - name: Publish wheel set to PyPI
        if: ${{ inputs.pypi_repository_url == '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist

      - name: Publish wheel set to alternate index
        if: ${{ inputs.pypi_repository_url != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: ${{ inputs.pypi_repository_url }}
          packages-dir: dist
