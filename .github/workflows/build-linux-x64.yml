name: Build Linux x64

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      binary_name: soldr
      source_ref: ${{ github.sha }}
