name: Build Windows x64

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_bootstrap-e2e.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      binary_name: soldr.exe
      source_ref: ${{ github.sha }}
