name: setup-soldr
author: zackees
description: Extraction-ready Soldr setup action. Installs one soldr binary, bootstraps rustup when needed, provisions the resolved Rust toolchain, and restores a cacheable runner-local Soldr root.
branding:
  icon: terminal
  color: green
inputs:
  version:
    description: Soldr version or tag to install. Defaults to the latest release.
    required: false
    default: ""
  repo:
    description: Release source repository override for extraction or local testing. Not part of the intended public setup-soldr@v0 beta contract.
    required: false
    default: zackees/soldr
  cache:
    description: Restore and save the action-managed cache/state root across workflow runs.
    required: false
    default: "true"
  cache-dir:
    description: Override the runner-local cache/state root used for Soldr, Cargo, and rustup state rehydrated by this action.
    required: false
    default: ""
  cache-key-suffix:
    description: Optional extra suffix appended to the cache key.
    required: false
    default: ""
  toolchain:
    description: Override the exact Rust toolchain channel string. When empty, toolchain-file is used if present, otherwise stable.
    required: false
    default: ""
  toolchain-file:
    description: Toolchain file to read when toolchain is not explicitly set.
    required: false
    default: rust-toolchain.toml
  trust-mode:
    description: Optional value for SOLDR_TRUST_MODE.
    required: false
    default: ""
  build-cache:
    description: >
      Restore and save the Soldr-owned zccache compilation artifact cache
      across workflow runs. Default "true"; the action restores the
      action-managed zccache cache root with a toolchain-scoped key and
      saves it at end-of-job, letting
      GitHub's own-branch -> PR base -> default-branch restore order seed
      feature-branch runs from the latest main-branch save without any
      repo-side configuration. Set to "false" to opt out.
    required: false
    default: "true"
  target-cache:
    description: >
      Restore and save the zccache-owned Rust artifact plan cache across
      workflow runs.
      Default "true"; target-cache-mode controls whether this is a bounded thin
      dependency-artifact cache or an explicit full target cache plan. Set to
      "false" to cache only zccache compilation artifacts.
    required: false
    default: "true"
  target-cache-mode:
    description: >
      Rust artifact cache mode. "thin" asks soldr to generate a bounded
      dependency-artifact plan for zccache by default. "full" asks zccache to
      cache the entire target-dir and should only be used for tightly scoped
      jobs. "off" disables target caching even when target-cache is true. The
      previous "hot" value is accepted as a deprecated alias for "thin".
    required: false
    default: thin
  target-dir:
    description: Cargo target directory used in target-cache key shaping.
    required: false
    default: target
  tool-shims:
    description: >
      Optional PATH shim mode for existing workflows. Set to "cargo" to make
      later `cargo ...` steps run through `soldr cargo ...` without rewriting
      them. Default "false" leaves PATH unchanged.
    required: false
    default: "false"
outputs:
  soldr-path:
    description: Installed Soldr binary path added to PATH for later steps.
    value: ${{ steps.resolve.outputs.soldr_path }}
  soldr-version:
    description: Installed Soldr version reported by soldr version --json.
    value: ${{ steps.verify.outputs.soldr_version }}
  cache-dir:
    description: Runner-local cache/state root used by the action.
    value: ${{ steps.resolve.outputs.cache_root }}
  cache-hit:
    description: Whether the action restored an exact cache hit for the selected cache/state root.
    value: ${{ steps.cache-meta.outputs.cache_hit }}
  build-cache-hit:
    description: >
      Whether the action restored the Soldr-owned zccache compilation
      artifact cache. "true" for an exact key match, "false" for a
      restore-key fallback or no cache, empty string when `build-cache`
      is explicitly disabled.
    value: ${{ steps.cache-meta.outputs.build_cache_hit }}
  target-cache-hit:
    description: >
      Whether the action restored the Rust artifact plan cache. "true"
      for an exact key match, "false" for a restore-key fallback or no cache,
      empty string when `target-cache` is disabled.
    value: ${{ steps.cache-meta.outputs.target_cache_hit }}
  target-cache-mode:
    description: Effective Rust artifact target cache mode.
    value: ${{ steps.resolve.outputs.target_cache_mode }}
  toolchain:
    description: Exact Rust toolchain channel configured by rustup for the action.
    value: ${{ steps.resolve.outputs.toolchain }}
  tool-shims-dir:
    description: Directory containing generated tool shims when tool-shims is enabled.
    value: ${{ steps.resolve.outputs.shim_dir }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: pwsh
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        INPUT_CACHE_KEY_SUFFIX: ${{ inputs.cache-key-suffix }}
        INPUT_TOOLCHAIN: ${{ inputs.toolchain }}
        INPUT_TOOLCHAIN_FILE: ${{ inputs.toolchain-file }}
        INPUT_TRUST_MODE: ${{ inputs.trust-mode }}
        INPUT_TARGET_CACHE: ${{ inputs.target-cache }}
        INPUT_TARGET_CACHE_MODE: ${{ inputs.target-cache-mode }}
        INPUT_TARGET_DIR: ${{ inputs.target-dir }}
        INPUT_TOOL_SHIMS: ${{ inputs.tool-shims }}
        ACTION_WORKSPACE: ${{ github.workspace }}
        ACTION_OS: ${{ runner.os }}
        ACTION_ARCH: ${{ runner.arch }}
      run: python "${{ github.action_path }}/.github/actions/setup-soldr/resolve_setup.py"

    - id: cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ steps.resolve.outputs.cache_root }}
        key: ${{ steps.resolve.outputs.cache_key }}
        restore-keys: |
          ${{ steps.resolve.outputs.cache_restore_prefix }}

    - id: build-cache-restore
      if: ${{ inputs.build-cache == 'true' }}
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ steps.resolve.outputs.build_cache_path }}
        key: ${{ steps.resolve.outputs.build_cache_key }}
        restore-keys: |
          ${{ steps.resolve.outputs.build_cache_restore_key_toolchain }}
          ${{ steps.resolve.outputs.build_cache_restore_key_os_arch }}

    - id: target-cache
      if: ${{ steps.resolve.outputs.target_cache_enabled == 'true' }}
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ steps.resolve.outputs.target_cache_paths }}
        key: ${{ steps.resolve.outputs.target_cache_key }}
        restore-keys: |
          ${{ steps.resolve.outputs.target_cache_restore_key_lock }}

    - id: toolchain
      shell: pwsh
      run: python "${{ github.action_path }}/.github/actions/setup-soldr/ensure_rust_toolchain.py"

    - id: install
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SOLDR_REPO: ${{ steps.resolve.outputs.soldr_repo }}
        SOLDR_INSTALL_DIR: ${{ steps.resolve.outputs.bin_dir }}
        SETUP_SOLDR_VERSION: ${{ steps.resolve.outputs.soldr_version_requested }}
      run: python "${{ github.action_path }}/.github/actions/setup-soldr/ensure_soldr.py"

    - id: verify
      shell: pwsh
      env:
        SETUP_SOLDR_PATH: ${{ steps.resolve.outputs.soldr_path }}
      run: python "${{ github.action_path }}/.github/actions/setup-soldr/verify_soldr.py"

    - id: tool-shims
      shell: pwsh
      env:
        SETUP_SOLDR_PATH: ${{ steps.resolve.outputs.soldr_path }}
        SETUP_SOLDR_SHIM_DIR: ${{ steps.resolve.outputs.shim_dir }}
        SETUP_SOLDR_TOOL_SHIMS: ${{ inputs.tool-shims }}
      run: python "${{ github.action_path }}/.github/actions/setup-soldr/install_tool_shims.py"

    - id: cache-meta
      shell: pwsh
      env:
        RAW_CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
        RAW_BUILD_CACHE_HIT: ${{ steps.build-cache-restore.outputs.cache-hit }}
        RAW_TARGET_CACHE_HIT: ${{ steps.target-cache.outputs.cache-hit }}
        BUILD_CACHE_ENABLED: ${{ inputs.build-cache }}
        TARGET_CACHE_ENABLED: ${{ inputs.target-cache }}
        EFFECTIVE_TARGET_CACHE_ENABLED: ${{ steps.resolve.outputs.target_cache_enabled }}
      run: |
        $value = $env:RAW_CACHE_HIT
        if ([string]::IsNullOrWhiteSpace($value)) {
          $value = "false"
        }
        "cache_hit=$value" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        if ($env:BUILD_CACHE_ENABLED -eq "true") {
          $buildValue = $env:RAW_BUILD_CACHE_HIT
          if ([string]::IsNullOrWhiteSpace($buildValue)) {
            $buildValue = "false"
          }
        } else {
          $buildValue = ""
        }
        "build_cache_hit=$buildValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        if ($env:EFFECTIVE_TARGET_CACHE_ENABLED -eq "true") {
          $targetValue = $env:RAW_TARGET_CACHE_HIT
          if ([string]::IsNullOrWhiteSpace($targetValue)) {
            $targetValue = "false"
          }
        } else {
          $targetValue = ""
        }
        "target_cache_hit=$targetValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
